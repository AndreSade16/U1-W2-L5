<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Page</title>
    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header id="header">
      <div id="topbar" class="dark-bg">
        <div id="header-img-container">
          <a href="#"><img src="assets/images/logo.png" alt="amazon-logo" /></a>
        </div>
      </div>
      <ul class="light-bg">
        <li><a href="#">All</a></li>
        <li><a href="#">Today's Deals</a></li>
        <li><a href="#">Customer Service</a></li>
        <li><a href="#">Registry</a></li>
        <li><a href="#">Gift Cards</a></li>
        <li><a href="#">Sell</a></li>
      </ul>
    </header>
    <main>
      <div id="content">
        <div id="gift-cards-shop" class="centered-text">
          <h5>Shop All Holyday Gift Cards</h5>
        </div>
        <div id="gift-guides" class="centered-text">
          <div id="text">
            <h2>Holyday Gift Guides</h2>
            <h4>Be a go-gifter</h4>
          </div>
        </div>
        <div id="gift-carousel">
          <div id="carousel-text">
            <h3>Find the perfect gift</h3>
            <a id="shop-now" href="#" class="green-a">Shop now</a>
          </div>
          <div id="carousel-scroll-container">
            <div class="carousel-container" id="carousel-1"></div>
            <div class="carousel-container" id="carousel-2"></div>
            <div class="carousel-container" id="carousel-3"></div>
            <div class="carousel-container" id="carousel-4"></div>
          </div>
        </div>
        <div class="img-and-caption">
          <div class="large-img-container">
            <img src="./assets/images/img_9.png" alt="" />
          </div>
          <div class="caption">
            <h3 class="centered-text">
              Play the gifting game
              <a href="#" class="green-a">Shop gaming</a>
            </h3>
          </div>
        </div>
        <div class="img-and-caption">
          <div class="large-img-container">
            <img src="./assets/images/img_10.png" alt="" />
          </div>
          <div class="caption">
            <h3 class="centered-text">
              The sound of cheer
              <a href="#" class="green-a">Shop Audio & Accessories</a>
            </h3>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div id="upscroll-container" class="light-bg centered-text">
        <a href="#header">Back to top</a>
      </div>
      <div id="bottom-bar" class="dark-bg centered-text">
        <div id="footer-img-container">
          <a href="#"><img src="assets/images/logo.png" alt="amazon-logo" /></a>
        </div>
      </div>
    </footer>
  </body>
</html>
